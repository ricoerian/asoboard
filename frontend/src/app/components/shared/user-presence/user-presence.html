<div class="relative">
  @if (getOnlineCount() > 0) {
    <button
      (click)="toggleList()"
      class="flex items-center gap-2 cursor-pointer bg-white/95 backdrop-blur-sm rounded-full px-2 py-1.5 shadow-lg border-2 border-white hover:border-blue-300 transition-all"
    >
      @if (users().length > 0) {
        <div
          class="w-9 h-9 rounded-full flex items-center justify-center text-white text-sm font-bold relative shrink-0"
          [class]="getAvatarColor(users()[0].userId)"
          [title]="users()[0].username"
        >
          {{ getInitial(users()[0].username) }}
          <span
            class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"
          ></span>
        </div>
      }

      <span class="bg-blue-100 text-blue-700 text-xs font-extrabold px-2 py-0.5 rounded-full">{{
        getOnlineCount()
      }}</span>
    </button>

    @if (showList()) {
      <div
        class="absolute bottom-full mb-2 right-0 bg-white rounded-xl shadow-2xl border-2 border-blue-200 overflow-hidden z-50"
        style="width: min(260px, calc(100vw-2rem)); height: 280px"
      >
        <div
          class="font-extrabold text-sm text-gray-700 px-3 py-2.5 border-b-2 border-blue-100 bg-blue-50/50 flex items-center gap-2"
        >
          <i class="fas fa-users text-blue-500"></i> Online ({{ getOnlineCount() }})
        </div>
        <div class="overflow-y-auto" style="height: calc(280px - 44px)">
          @for (user of users(); track user.userId) {
            <div
              class="flex items-center gap-2.5 px-3 py-2.5 hover:bg-blue-50 transition-colors border-b border-gray-50 last:border-0"
            >
              <div
                class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold relative shrink-0"
                [class]="getAvatarColor(user.userId)"
              >
                {{ getInitial(user.username) }}
                @if (user.isOnline) {
                  <span
                    class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-white"
                  ></span>
                }
              </div>
              <div class="flex-1 min-w-0">
                <div class="text-sm font-bold text-gray-800 truncate">{{ user.username }}</div>
                <div class="text-xs text-gray-400 font-semibold">
                  {{ user.isOnline ? 'Online' : 'Offline' }}
                </div>
              </div>
            </div>
          }
        </div>
      </div>
    }
  }
</div>
