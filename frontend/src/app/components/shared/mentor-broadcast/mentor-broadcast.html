<div class="relative space-y-2" style="width: min(320px, calc(100vw-2rem))">
  @if (userRole() === 'mentor') {
    <div class="bg-blue-50 rounded-xl shadow-lg border-2 border-blue-300 p-3">
      <div class="text-xs font-bold text-blue-700 mb-2">
        <i class="fas fa-bullhorn text-blue-500"></i> Send Broadcast
      </div>
      <div class="flex gap-2">
        <input
          type="text"
          [ngModel]="broadcastInput()"
          (ngModelChange)="onInputChange($event)"
          placeholder="Message to all students..."
          maxlength="500"
          class="flex-1 text-sm px-2 py-1 border border-blue-200 rounded focus:outline-none focus:border-blue-500"
          (keydown.enter)="$event.preventDefault(); sendBroadcast()"
        />
        <button
          (click)="sendBroadcast()"
          [disabled]="!broadcastInput()"
          class="bg-blue-500 text-white px-3 py-1 rounded text-sm font-bold disabled:bg-gray-300 hover:bg-blue-600 transition-colors"
        >
          <i class="fas fa-paper-plane text-white"></i>
        </button>
      </div>
    </div>
  }
  @for (broadcast of broadcasts(); track $index) {
    <div class="bg-blue-600 rounded-xl shadow-lg text-white p-3 relative">
      <button
        (click)="dismissBroadcast($index)"
        class="absolute top-1 right-1 text-white/70 hover:text-white text-xs"
      >
        <i class="fas fa-times text-white"></i>
      </button>
      <div class="flex items-start gap-2">
        <div
          class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center text-sm font-bold shrink-0"
        >
          {{ getInitial(broadcast.username) }}
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-xs font-bold opacity-90 mb-1">
            <i class="fas fa-bullhorn text-white"></i> {{ broadcast.username }}
          </div>
          <div class="text-sm break-words">{{ broadcast.message }}</div>
        </div>
      </div>
    </div>
  }
</div>
