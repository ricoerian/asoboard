# ================================================
# AsoBoard - Production Nginx Configuration
# ================================================
# Optimized for performance, security, and scalability

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Load dynamic modules
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ================================================
    # Basic Settings
    # ================================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ================================================
    # Logging
    # ================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ================================================
    # Performance Settings
    # ================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    types_hash_max_size 2048;
    server_tokens off;

    # ================================================
    # Buffer Settings (Performance)
    # ================================================
    client_body_buffer_size 128k;
    client_max_body_size 100M;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    output_buffers 1 32k;
    postpone_output 1460;

    # ================================================
    # Timeout Settings
    # ================================================
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ================================================
    # Gzip Compression
    # ================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;
    gzip_disable "msie6";
    gzip_min_length 256;

    # ================================================
    # Security Headers
    # ================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ================================================
    # Rate Limiting Zones
    # ================================================
    # General API rate limit: 100 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    
    # Login rate limit: 5 req/min per IP
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    
    # Media upload rate limit: 10 req/min per IP
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

    # Connection limit: max 10 concurrent connections per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ================================================
    # Cache Settings
    # ================================================
    proxy_cache_path /var/cache/nginx/api
        levels=1:2
        keys_zone=api_cache:10m
        max_size=100m
        inactive=60m
        use_temp_path=off;

    proxy_cache_path /var/cache/nginx/static
        levels=1:2
        keys_zone=static_cache:10m
        max_size=500m
        inactive=7d
        use_temp_path=off;

    # ================================================
    # Upstream (Load Balancing)
    # ================================================
    upstream django_backend {
        least_conn;  # Load balancing method
        
        server backend:8000 weight=1 max_fails=3 fail_timeout=30s;
        # Add more Django instances for horizontal scaling:
        # server backend2:8000 weight=1 max_fails=3 fail_timeout=30s;
        # server backend3:8000 weight=1 max_fails=3 fail_timeout=30s;
        
        keepalive 32;
    }

    # ================================================
    # Include Virtual Host Configs
    # ================================================
    include /etc/nginx/conf.d/*.conf;
}