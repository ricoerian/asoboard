# ================================================
# Backend API - Reverse Proxy Configuration
# ================================================

server {
    listen 80;
    server_name api.asoboard.local localhost;
    
    # Maximum upload size
    client_max_body_size 100M;
    
    # ================================================
    # Security Headers
    # ================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ================================================
    # Rate Limiting
    # ================================================
    limit_conn conn_limit 10;

    # ================================================
    # API Endpoints with Rate Limiting
    # ================================================
    location /api/ {
        # General API rate limit
        limit_req zone=api_limit burst=20 nodelay;
        
        # Proxy settings
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # HTTP version
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Disable cache for API
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ================================================
    # Authentication Endpoints (Stricter Rate Limit)
    # ================================================
    location ~ ^/api/(login|register|token|password-reset) {
        limit_req zone=login_limit burst=3 nodelay;
        
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # No caching for auth endpoints
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ================================================
    # WebSocket Support (Django Channels)
    # ================================================
    location /ws/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # ================================================
    # Static Files (Served by Nginx)
    # ================================================
    location /static/ {
        alias /app/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        # Gzip for static
        gzip_static on;
    }

    # ================================================
    # Media Files (User Uploads) with Rate Limit
    # ================================================
    location /media/ {
        limit_req zone=upload_limit burst=5 nodelay;
        
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
        
        # Security: Prevent execution
        location ~ \.(php|py|pl|sh|cgi)$ {
            deny all;
        }
    }

    # ================================================
    # Django Admin (Extra Security)
    # ================================================
    location /admin/ {
        limit_req zone=login_limit burst=5 nodelay;
        
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Additional security headers for admin
        add_header X-Frame-Options "DENY" always;
    }

    # ================================================
    # Health Check Endpoint (No Rate Limit)
    # ================================================
    location /health/ {
        proxy_pass http://django_backend;
        access_log off;
    }

    # ================================================
    # Block Sensitive Files
    # ================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}