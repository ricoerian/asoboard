# ================================================
# AsoBoard - Production Docker Compose
# ================================================
# Full stack: PostgreSQL, Redis, Django+Gunicorn, Nginx

version: '3.8'

services:
  # ================================================
  # PostgreSQL Database
  # ================================================
  db:
    image: postgres:15-alpine
    container_name: asoboard_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-asoboard}
      POSTGRES_USER: ${POSTGRES_USER:-asoboard_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asoboard_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - asoboard_network

  # ================================================
  # Redis Cache & Session Store
  # ================================================
  redis:
    image: redis:7-alpine
    container_name: asoboard_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - asoboard_network

  # ================================================
  # Django Backend with Gunicorn
  # ================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asoboard_backend
    command: gunicorn config.wsgi:application -c gunicorn.conf.py
    environment:
      # Django settings
      SECRET_KEY: ${SECRET_KEY:-django-insecure-CHANGE-THIS}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,nginx_backend}
      
      # Database
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.postgresql}
      DB_NAME: ${DB_NAME:-asoboard}
      DB_USER: ${DB_USER:-asoboard_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      
      # Redis
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:8000}
      
      # Gunicorn
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
    volumes:
      - ./backend:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - asoboard_network

  # ================================================
  # Nginx Backend Proxy (Rate Limit, Cache, Load Balance)
  # ================================================
  nginx_backend:
    image: nginx:alpine
    container_name: asoboard_nginx_backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/backend.conf:/etc/nginx/conf.d/default.conf:ro
      - media_files:/app/media:ro
      - static_files:/app/staticfiles:ro
      - nginx_cache:/var/cache/nginx
    ports:
      - "8000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - asoboard_network

  # ================================================
  # Angular Frontend with Nginx
  # ================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: asoboard_frontend
    volumes:
      - ./nginx/conf.d/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "4200:80"
    depends_on:
      - nginx_backend
    restart: unless-stopped
    networks:
      - asoboard_network

# ================================================
# Named Volumes
# ================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media_files:
    driver: local
  static_files:
    driver: local
  nginx_cache:
    driver: local

# ================================================
# Network Configuration
# ================================================
networks:
  asoboard_network:
    driver: bridge